<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>You Rush Midnight Sun Lasers Preview</title>
  <style>
    :root { color-scheme: dark; font-family: Arial, sans-serif; background:#081224; color:#f7fbff }
    * { box-sizing:border-box }
    body { margin:0; min-height:100vh; display:grid; grid-template-columns:300px 1fr }
    aside { padding:18px; background:#101926; border-right:1px solid #ffffff24; overflow:auto }
    h1 { margin:0 0 8px; font-size:20px }
    p { color:#c7d6df; font-size:13px; line-height:1.45 }
    label { display:block; margin:13px 0 6px; color:#c7d6df; font-size:13px }
    select,input,button { width:100%; min-height:34px; border:1px solid #ffffff3d; border-radius:6px; background:#172235; color:white; padding:7px }
    input[type=range] { padding:0 }
    .check { display:flex; align-items:center; gap:8px }
    .check input { width:auto }
    button { margin-top:14px; background:#ffda79; color:#18202a; font-weight:700; cursor:pointer }
    #report { margin-top:14px; padding:11px; background:#ffffff12; border-radius:6px; white-space:pre-wrap; font-size:12px; line-height:1.45 }
    main { display:grid; place-items:center; min-width:0; padding:20px; overflow:auto }
    canvas { max-width:100%; max-height:calc(100vh - 40px); background:#081224; box-shadow:0 18px 50px #0008 }
    @media(max-width:760px){ body{grid-template-columns:1fr} aside{border-right:0;border-bottom:1px solid #ffffff24} }
  </style>
</head>
<body>
  <aside>
    <h1>Midnight Sun Lasers</h1>
    <p>Stage-one twin-eye laser sandbox, matched to the layered glow and readable core of the polar-bear reference.</p>
    <label for="phase">Phase</label>
    <select id="phase"><option value="auto">Auto cycle</option><option value="tell">Tell</option><option value="fire">Fire</option><option value="recover">Recover</option></select>
    <label for="width">Beam thickness</label><input id="width" type="range" min="3" max="10" step=".5" value="6">
    <label for="speed">Animation speed</label><input id="speed" type="range" min=".3" max="1.8" step=".1" value="1">
    <label class="check"><input id="hitbox" type="checkbox" checked>Show gameplay hitbox</label>
    <label class="check"><input id="grid" type="checkbox" checked>Show 15 px grid</label>
    <button id="pause">Pause</button>
    <div id="report"></div>
  </aside>
  <main><canvas id="c" width="960" height="540"></canvas></main>
  <script>
    const c=document.querySelector('#c'),x=c.getContext('2d');
    const ui={phase:document.querySelector('#phase'),width:document.querySelector('#width'),speed:document.querySelector('#speed'),hitbox:document.querySelector('#hitbox'),grid:document.querySelector('#grid'),pause:document.querySelector('#pause'),report:document.querySelector('#report')};
    const bg=new Image(); bg.src='../app/src/main/res/drawable-nodpi/background_midnight_sun_art.png';
    let t=0,last=performance.now(),paused=false;
    ui.pause.onclick=()=>{paused=!paused;ui.pause.textContent=paused?'Resume':'Pause'};
    function phase(){if(ui.phase.value!=='auto')return ui.phase.value;const q=t%3.8;return q<1.05?'tell':q<2.35?'fire':'recover'}
    function progress(p){if(ui.phase.value!=='auto')return .5+.5*Math.sin(t*2.4);const q=t%3.8;return p==='tell'?q/1.05:p==='fire'?(q-1.05)/1.3:(q-2.35)/1.45}
    function line(a,b,d,e){x.beginPath();x.moveTo(a,b);x.lineTo(d,e);x.stroke()}
    function beam(a,b,d,e,h,alpha,pulse){
      const g=x.createLinearGradient(a,b,d,e);g.addColorStop(0,`rgba(255,246,207,${.94*alpha})`);g.addColorStop(.25,`rgba(255,98,84,${.84*alpha})`);g.addColorStop(1,`rgba(132,213,232,${.18*alpha})`);
      x.save();x.globalCompositeOperation='lighter';x.lineCap='round';x.shadowColor='#ff6254';
      x.strokeStyle=`rgba(255,98,84,${.12*alpha})`;x.lineWidth=h*4.2;x.shadowBlur=22;line(a,b,d,e);
      x.strokeStyle=`rgba(255,98,84,${.3*alpha})`;x.lineWidth=h*2.2;x.shadowBlur=15;line(a,b,d,e);
      x.strokeStyle=g;x.lineWidth=h*(.9+pulse*.16);x.shadowBlur=9;line(a,b,d,e);
      x.strokeStyle=`rgba(255,255,255,${.8*alpha})`;x.lineWidth=Math.max(1,h*.22);x.shadowBlur=3;line(a,b,d,e);x.restore();
    }
    function sun(p,q){
      const cx=748,cy=276,r=76,pulse=.5+.5*Math.sin(t*6);x.save();
      x.fillStyle=`rgba(255,166,84,${.28+.18*pulse})`;x.beginPath();x.arc(cx,cy,r*1.55,0,7);x.fill();
      x.fillStyle='#ffda79';for(let i=0;i<12;i++){const a=i*Math.PI/6+t*.35,ri=r*1.03,ro=r*(1.34+.12*Math.sin(t*4.5+i));x.beginPath();x.moveTo(cx+Math.cos(a-.1)*ri,cy+Math.sin(a-.1)*ri);x.lineTo(cx+Math.cos(a)*ro,cy+Math.sin(a)*ro);x.lineTo(cx+Math.cos(a+.1)*ri,cy+Math.sin(a+.1)*ri);x.fill()}
      x.fillStyle='#ffda79';x.beginPath();x.arc(cx,cy,r*.98,0,7);x.fill();x.fillStyle='#ffa654';x.beginPath();x.arc(cx,cy,r*.76,0,7);x.fill();
      const eyes=[cx-r*.28,cx+r*.28],ey=cy-r*.12;x.fillStyle='#521218';eyes.forEach(ex=>{x.beginPath();x.arc(ex,ey,6,0,7);x.fill()});
      if(p!=='recover'){const glow=p==='fire'?1:q;x.shadowColor='#ff6254';x.shadowBlur=10+glow*12;x.fillStyle=`rgba(255,246,207,${.5+.5*glow})`;eyes.forEach(ex=>{x.beginPath();x.arc(ex,ey,3+glow*2,0,7);x.fill()})}x.restore();return{eyes,ey}
    }
    function runner(p){const ground=430,j=p==='fire'?62+Math.sin(t*5)*8:0,cx=230,cy=ground-47-j;x.fillStyle='#0004';x.beginPath();x.ellipse(cx,ground+4,36,8,0,0,7);x.fill();x.strokeStyle='#1f2226';x.lineWidth=5;x.fillStyle='#3486c4';x.fillRect(cx-17,cy+18,34,53);x.fillStyle='#ffb146';x.beginPath();x.arc(cx,cy,19,0,7);x.fill();x.stroke();x.lineWidth=7;line(cx-12,cy+68,cx-28,cy+98);line(cx+10,cy+68,cx+25,cy+98);return{y:cy+44}}
    function render(now){const dt=Math.min(.033,(now-last)/1000);last=now;if(!paused)t+=dt*+ui.speed.value;const p=phase(),q=Math.max(0,Math.min(1,progress(p)));
      x.clearRect(0,0,c.width,c.height);if(bg.complete&&bg.naturalWidth)x.drawImage(bg,0,0,c.width,c.height);else{x.fillStyle='#172b48';x.fillRect(0,0,c.width,c.height)}x.fillStyle='#08122438';x.fillRect(0,0,c.width,c.height);x.fillStyle='#e9f3f6';x.fillRect(0,430,c.width,110);
      const player=runner(p),boss=sun(p,q),active=p==='fire',alpha=active?1:p==='tell'?q*.62:(1-q)*.24,target=Math.max(285,Math.min(390,player.y+Math.sin(t*5.4)*18)),endX=active?92:boss.eyes[0]-(130+q*250),endY=active?boss.ey+(target-boss.ey)*Math.min(1,q*1.18):boss.ey+6,h=+ui.width.value,pulse=.72+Math.sin(t*26)*.28;
      beam(boss.eyes[0],boss.ey,endX,endY,h,alpha,pulse);beam(boss.eyes[1],boss.ey,endX,endY+2.4,h*.78,alpha*.82,pulse);
      if(ui.hitbox.checked){x.fillStyle='#ff625422';x.strokeStyle='#ff6254c7';x.lineWidth=2;x.fillRect(endX,endY-6,boss.eyes[0]-endX,12);x.strokeRect(endX,endY-6,boss.eyes[0]-endX,12)}
      if(ui.grid.checked){
        x.save();x.lineWidth=1;x.font='10px Arial';x.textAlign='left';
        for(let i=0;i<=c.width;i+=15){const major=i%60===0;x.strokeStyle=major?'rgba(255,218,121,.26)':'rgba(255,255,255,.075)';line(i,0,i,c.height);if(major){x.fillStyle='rgba(255,246,207,.72)';x.fillText(String(i),i+3,14)}}
        for(let i=0;i<=c.height;i+=15){const major=i%60===0;x.strokeStyle=major?'rgba(255,218,121,.26)':'rgba(255,255,255,.075)';line(0,i,c.width,i);if(major){x.fillStyle='rgba(255,246,207,.72)';x.fillText(String(i),4,i+12)}}
        x.restore();
      }
      ui.report.textContent=`Phase: ${p}\nBeam: twin / ${h.toFixed(1)} px\nLeft eye: ${Math.round(boss.eyes[0])}, ${Math.round(boss.ey)}\nRight eye: ${Math.round(boss.eyes[1])}, ${Math.round(boss.ey)}\n\nVisual glow is intentionally wider than the thin collision lane.`;requestAnimationFrame(render)}requestAnimationFrame(render);
  </script>
</body>
</html>
