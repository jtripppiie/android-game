<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>You Rush Platformer Overhaul</title>
<style>:root{color-scheme:dark;font-family:Arial;background:#081224;color:white}body{margin:0;display:grid;grid-template-columns:280px 1fr;min-height:100vh}aside{padding:18px;background:#101926}label{display:block;margin:12px 0}main{display:grid;place-items:center;padding:18px}canvas{max-width:100%;box-shadow:0 16px 48px #0008}input{margin-right:8px}button{width:100%;padding:9px;background:#ffda79;border:0;border-radius:6px;font-weight:bold}@media(max-width:760px){body{grid-template-columns:1fr}}</style></head>
<body><aside><h1>Platformer Overhaul</h1><p>Camera, terrain, runner scale, chase visibility, and translucent-control composition.</p><label><input id="grid" type="checkbox" checked>Numbered 15 px grid</label><label><input id="controls" type="checkbox" checked>Touch controls</label><label><input id="bear" type="checkbox" checked>Chase bear</label><button id="pause">Pause</button><pre id="report"></pre></aside><main><canvas id="c" width="960" height="540"></canvas></main>
<script>const c=document.querySelector('#c'),x=c.getContext('2d'),grid=document.querySelector('#grid'),controls=document.querySelector('#controls'),bear=document.querySelector('#bear'),report=document.querySelector('#report');const img=new Image();img.src='../app/src/main/res/drawable-nodpi/sheet_runner_overhaul_candidate.png';let t=0,last=performance.now(),paused=false;document.querySelector('#pause').onclick=()=>paused=!paused;
function line(a,b,d,e){x.beginPath();x.moveTo(a,b);x.lineTo(d,e);x.stroke()}function rr(a,b,w,h,r){x.beginPath();x.roundRect(a,b,w,h,r);x.fill();x.stroke()}
function render(n){const dt=Math.min(.033,(n-last)/1000);last=n;if(!paused)t+=dt;x.fillStyle='#163d62';x.fillRect(0,0,960,540);x.fillStyle='#376984';for(let i=-1;i<6;i++){x.beginPath();x.moveTo(i*220,390);x.lineTo(i*220+150,145+(i%2)*45);x.lineTo(i*220+350,390);x.fill()}x.fillStyle='#e8f4f5';x.fillRect(0,390,960,150);x.fillStyle='#d9ecef';x.beginPath();x.moveTo(380,390);x.lineTo(610,300);x.lineTo(720,390);x.fill();
const px=255,py=390;if(bear.checked){x.fillStyle='#0005';x.beginPath();x.ellipse(145,395,49,10,0,0,7);x.fill();x.fillStyle='#6c5142';x.beginPath();x.arc(145,342,42,0,7);x.fill();x.fillStyle='#fff';x.font='bold 12px Arial';x.fillText('CHASE',118,290)}if(img.complete){const f=Math.floor(t*10)%6,w=img.width/6;x.drawImage(img,f*w,0,w,img.height,px-47,py-137,94,137)}
x.fillStyle='#ffda79';for(let i=0;i<4;i++){x.beginPath();x.arc(520+i*52,260-Math.sin((i+1)/5*Math.PI)*50,8,0,7);x.fill()}if(controls.checked){const boxes=[[18,430,66,66,'◀'],[92,430,66,66,'▶'],[716,454,58,48,'DASH'],[786,444,62,62,'RUN'],[862,414,68,68,'JUMP']];for(const q of boxes){x.fillStyle='rgba(10,20,32,.24)';x.strokeStyle='rgba(255,255,255,.30)';x.lineWidth=2;rr(q[0],q[1],q[2],q[3]||q[2],16);x.fillStyle='rgba(255,255,255,.72)';x.font='bold 11px Arial';x.textAlign='center';x.fillText(q[4],q[0]+q[2]/2,q[1]+(q[3]||q[2])/2+4)}}if(grid.checked){x.font='10px Arial';x.textAlign='left';for(let i=0;i<=960;i+=15){x.strokeStyle=i%60?'#ffffff12':'#ffda7942';line(i,0,i,540);if(i%60===0){x.fillStyle='#fff6cfb8';x.fillText(i,i+3,12)}}for(let i=0;i<=540;i+=15){x.strokeStyle=i%60?'#ffffff12':'#ffda7942';line(0,i,960,i);if(i%60===0){x.fillStyle='#fff6cfb8';x.fillText(i,3,i+12)}}}report.textContent='D-pad: 88dp target\nIdle opacity: 24%\nRunner: 94×137 preview\nDash + stomp enabled\nBear visibility: '+(bear.checked?'on':'off');requestAnimationFrame(render)}requestAnimationFrame(render);</script></body></html>
