<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>You Rush Sprite Sheet Audit</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Arial, Helvetica, sans-serif;
      background: #081224;
      color: #f7fbff;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      grid-template-columns: 340px 1fr;
    }

    aside {
      box-sizing: border-box;
      max-height: 100vh;
      overflow: auto;
      padding: 18px;
      background: #101926;
      border-right: 1px solid rgba(255, 255, 255, 0.14);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 20px;
    }

    p {
      margin: 0 0 14px;
      color: #c7d6df;
      font-size: 13px;
      line-height: 1.42;
    }

    label {
      display: block;
      margin: 12px 0 6px;
      color: #c7d6df;
      font-size: 13px;
    }

    select,
    input {
      box-sizing: border-box;
      width: 100%;
      min-height: 34px;
      padding: 7px 9px;
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-radius: 6px;
      background: #172235;
      color: #fff;
      font: inherit;
    }

    .checks label {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 9px 0;
    }

    .checks input {
      width: auto;
      min-height: auto;
    }

    #report {
      margin-top: 14px;
      padding: 12px;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.08);
      color: #dcebef;
      font-size: 12.5px;
      line-height: 1.45;
      white-space: pre-wrap;
    }

    main {
      min-width: 0;
      padding: 22px;
      overflow: auto;
    }

    canvas {
      background: #081224;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.42);
    }
  </style>
</head>
<body>
  <aside>
    <h1>Sprite Sheet Audit</h1>
    <p>Loads the actual PNG sheets from the Android project and numbers every frame for artifact reports.</p>

    <label for="sheet">Sprite sheet</label>
    <select id="sheet">
      <option value="../app/src/main/res/drawable-nodpi/sheet_player_run_headless.png,6">Runner body sheet</option>
      <option value="../app/src/main/res/drawable-nodpi/sheet_dad_run.png,6">Dad runner sheet</option>
      <option value="../app/src/main/res/drawable-nodpi/sheet_mom_run.png,6">Mom runner sheet</option>
      <option value="../app/src/main/res/drawable-nodpi/sheet_polar_bear_walk.png,6">Polar bear walk sheet</option>
      <option value="../app/src/main/res/drawable-nodpi/sheet_bear_walk.png,6">Bear walk sheet</option>
      <option value="../app/src/main/res/drawable-nodpi/sheet_wolf_run.png,6">Wolf run sheet</option>
      <option value="../app/src/main/res/drawable-nodpi/sheet_salmon_swim.png,6">Salmon swim sheet</option>
      <option value="../app/src/main/res/drawable-nodpi/sheet_eagle_fly.png,6">Eagle fly sheet</option>
      <option value="../app/src/main/res/drawable-nodpi/sprite_polar_bear_roar.png,1">Polar bear roar sprite</option>
      <option value="../app/src/main/res/drawable-nodpi/sprite_bear_roar.png,1">Bear roar sprite</option>
    </select>

    <label for="zoom">Zoom: <span id="zoomLabel">2.0</span>x</label>
    <input id="zoom" type="range" min="1" max="5" step="0.25" value="2">

    <label for="trim">Trim inset: <span id="trimLabel">8</span> px</label>
    <input id="trim" type="range" min="0" max="40" step="1" value="8">

    <div class="checks">
      <label><input id="checker" type="checkbox" checked> Transparency checkerboard</label>
      <label><input id="frames" type="checkbox" checked> Frame boxes</label>
      <label><input id="trimBox" type="checkbox" checked> Trim boxes</label>
      <label><input id="runtimeCrop" type="checkbox" checked> Runtime safe crop</label>
      <label><input id="badges" type="checkbox" checked> Numbered frame badges</label>
      <label><input id="grid" type="checkbox" checked> Show 15 px grid</label>
    </div>

    <div id="report"></div>
  </aside>

  <main>
    <canvas id="preview" width="1280" height="720"></canvas>
  </main>

  <script>
    const canvas = document.getElementById("preview");
    const ctx = canvas.getContext("2d");
    const ui = {
      sheet: document.getElementById("sheet"),
      zoom: document.getElementById("zoom"),
      zoomLabel: document.getElementById("zoomLabel"),
      trim: document.getElementById("trim"),
      trimLabel: document.getElementById("trimLabel"),
      checker: document.getElementById("checker"),
      frames: document.getElementById("frames"),
      trimBox: document.getElementById("trimBox"),
      runtimeCrop: document.getElementById("runtimeCrop"),
      badges: document.getElementById("badges"),
      grid: document.getElementById("grid"),
      report: document.getElementById("report")
    };

    const image = new Image();
    const SPRITE_EDGE_GUARD_PX = 14;
    const SPRITE_TRIM_INSET_PX = 6;
    const runtimeTrims = {
      "sheet_moose_walk.png": [
        [14, 226, 362, 527],
        [0, 224, 362, 528],
        [0, 223, 362, 527],
        [0, 217, 362, 528],
        [0, 233, 362, 528],
        [0, 229, 336, 527]
      ],
      "sheet_bear_walk.png": [
        [21, 263, 362, 499],
        [0, 292, 358, 502],
        [6, 293, 354, 500],
        [0, 288, 362, 502],
        [0, 292, 362, 504],
        [0, 283, 339, 504]
      ],
      "sheet_polar_bear_walk.png": [
        [30, 273, 362, 476],
        [0, 275, 362, 476],
        [0, 275, 360, 477],
        [10, 275, 362, 476],
        [22, 275, 361, 477],
        [2, 275, 346, 477]
      ],
      "sheet_wolf_run.png": [
        [28, 266, 362, 469],
        [0, 275, 362, 461],
        [0, 266, 362, 467],
        [0, 274, 362, 469],
        [0, 272, 362, 468],
        [0, 271, 342, 468]
      ],
      "sheet_salmon_swim.png": [
        [22, 296, 361, 436],
        [34, 262, 362, 436],
        [0, 260, 362, 456],
        [0, 298, 362, 438],
        [0, 308, 362, 492],
        [0, 305, 352, 497]
      ],
      "sheet_eagle_fly.png": [
        [17, 146, 362, 490],
        [0, 258, 307, 494],
        [0, 396, 334, 596],
        [8, 221, 362, 501],
        [0, 151, 362, 505],
        [0, 376, 345, 509]
      ]
    };

    function loadSheet() {
      image.src = ui.sheet.value.split(",")[0];
    }

    function drawChecker(x, y, w, h, size) {
      if (!ui.checker.checked) return;
      for (let yy = y; yy < y + h; yy += size) {
        for (let xx = x; xx < x + w; xx += size) {
          const even = ((xx - x) / size + (yy - y) / size) % 2 === 0;
          ctx.fillStyle = even ? "#2c3542" : "#182231";
          ctx.fillRect(xx, yy, size, size);
        }
      }
    }

    function roundedRect(x, y, w, h, r, fill, stroke) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
      if (fill) ctx.fill();
      if (stroke) ctx.stroke();
    }

    function drawGrid() {
      if (!ui.grid.checked) return;
      ctx.save();
      ctx.font = "10px Arial, Helvetica, sans-serif";
      ctx.textAlign = "left";
      ctx.lineWidth = 1;
      for (let x = 0; x <= canvas.width; x += 15) {
        const major = x % 60 === 0;
        ctx.strokeStyle = major ? "rgba(255, 218, 121, 0.26)" : "rgba(255, 255, 255, 0.075)";
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
        if (major) {
          ctx.fillStyle = "rgba(255, 246, 207, 0.72)";
          ctx.fillText(String(x), x + 3, 14);
        }
      }
      for (let y = 0; y <= canvas.height; y += 15) {
        const major = y % 60 === 0;
        ctx.strokeStyle = major ? "rgba(255, 218, 121, 0.26)" : "rgba(255, 255, 255, 0.075)";
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
        if (major) {
          ctx.fillStyle = "rgba(255, 246, 207, 0.72)";
          ctx.fillText(String(y), 4, y + 12);
        }
      }
      ctx.restore();
    }

    function sheetName(path) {
      return path.split("/").pop();
    }

    function runtimeSource(frameIndex, frameW, frameH, trim) {
      if (!trim) {
        return { left: frameIndex * frameW, top: 0, width: frameW, height: frameH };
      }
      const left = (trim[0] === 0 ? SPRITE_EDGE_GUARD_PX : trim[0]) + SPRITE_TRIM_INSET_PX;
      const top = trim[1] + SPRITE_TRIM_INSET_PX;
      const right = (trim[2] >= frameW ? frameW - SPRITE_EDGE_GUARD_PX : trim[2]) - SPRITE_TRIM_INSET_PX;
      const bottom = Math.min(trim[3], frameH) - SPRITE_TRIM_INSET_PX;
      if (right <= left || bottom <= top) {
        return { left: frameIndex * frameW, top: 0, width: frameW, height: frameH };
      }
      return {
        left: frameIndex * frameW + left,
        top,
        width: right - left,
        height: bottom - top
      };
    }

    function render() {
      const zoom = Number(ui.zoom.value);
      const trim = Number(ui.trim.value);
      const parts = ui.sheet.value.split(",");
      const path = parts[0];
      const name = sheetName(path);
      const frames = Number(parts[1]);
      const sheetTrims = runtimeTrims[name] || null;
      ui.zoomLabel.textContent = zoom.toFixed(2);
      ui.trimLabel.textContent = String(trim);
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#081224";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      if (!image.complete || image.naturalWidth <= 0) {
        ctx.fillStyle = "#fff6cf";
        ctx.font = "700 18px Arial";
        ctx.fillText("Loading sprite sheet...", 28, 42);
        requestAnimationFrame(render);
        return;
      }

      const frameW = image.naturalWidth / frames;
      const frameH = image.naturalHeight;
      const viewW = frameW * zoom;
      const viewH = frameH * zoom;
      const gap = 24;
      const columns = Math.max(1, Math.floor((canvas.width - 40) / (viewW + gap)));
      const rows = Math.ceil(frames / columns);
      canvas.height = Math.max(720, 70 + rows * (viewH + 56));
      ctx.fillStyle = "#081224";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      drawGrid();

      for (let i = 0; i < frames; i++) {
        const col = i % columns;
        const row = Math.floor(i / columns);
        const x = 24 + col * (viewW + gap);
        const y = 54 + row * (viewH + 56);
        drawChecker(x, y, viewW, viewH, 12);
        ctx.imageSmoothingEnabled = false;
        ctx.drawImage(image, i * frameW, 0, frameW, frameH, x, y, viewW, viewH);
        if (ui.frames.checked) {
          ctx.strokeStyle = "#ffda79";
          ctx.lineWidth = 2;
          ctx.strokeRect(x, y, viewW, viewH);
        }
        if (ui.trimBox.checked && trim > 0) {
          ctx.strokeStyle = "#ff6254";
          ctx.setLineDash([7, 5]);
          ctx.strokeRect(x + trim * zoom, y + trim * zoom, viewW - trim * 2 * zoom, viewH - trim * 2 * zoom);
          ctx.setLineDash([]);
        }
        if (ui.runtimeCrop.checked && sheetTrims && sheetTrims[i]) {
          const source = runtimeSource(i, frameW, frameH, sheetTrims[i]);
          const cropX = x + (source.left - i * frameW) * zoom;
          const cropY = y + source.top * zoom;
          const cropW = source.width * zoom;
          const cropH = source.height * zoom;
          ctx.strokeStyle = "#4ddbb8";
          ctx.lineWidth = 2;
          ctx.strokeRect(cropX, cropY, cropW, cropH);
          ctx.fillStyle = "rgba(77, 219, 184, 0.10)";
          ctx.fillRect(cropX, cropY, cropW, cropH);
        }
        if (ui.badges.checked) {
          const label = "F" + (i + 1);
          ctx.font = "700 14px Arial";
          const badgeW = Math.max(34, ctx.measureText(label).width + 14);
          ctx.fillStyle = "rgba(8,18,30,0.9)";
          roundedRect(x, y - 32, badgeW, 24, 7, true, false);
          ctx.strokeStyle = "#ff6254";
          ctx.stroke();
          ctx.fillStyle = "#fff6cf";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(label, x + badgeW / 2, y - 20);
        }
      }

      ui.report.textContent =
        "Report format:\n" +
        "- F3 has foot artifact on lower right.\n" +
        "- F5 trim box cuts too close to antler/ear.\n" +
        "- Whole sheet has colored fringe on checkerboard.\n\n" +
        "Current sheet:\n" +
        path.replace("../app/src/main/res/drawable-nodpi/", "") +
        "\nFrames: " + frames +
        "\nFrame size: " + Math.round(frameW) + " x " + Math.round(frameH) +
        "\nTrim inset preview: " + trim + " px" +
        "\nRuntime crop: " + (sheetTrims ? "available, green box" : "none for this sheet");

      requestAnimationFrame(render);
    }

    ui.sheet.addEventListener("change", loadSheet);
    image.addEventListener("load", render);
    loadSheet();
    requestAnimationFrame(render);
  </script>
</body>
</html>
