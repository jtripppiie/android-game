name: Android Debug APK

on:
  workflow_dispatch:
  push:
    branches:
      - jtripp

jobs:
  build-debug-apk:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: 'platform-tools platforms;android-35 build-tools;35.0.0'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Print debug environment
        run: |
          java -version
          gradle --version
          sdkmanager --list_installed

      - name: Check project files
        run: |
          test -f settings.gradle
          test -f build.gradle
          test -f app/build.gradle
          test -f app/src/main/AndroidManifest.xml
          test -f app/src/main/java/com/jtripppiie/mooserush/MainActivity.java

      - name: Build debug APK
        run: |
          mkdir -p build/ci-logs
          set +e
          gradle assembleDebug --stacktrace --warning-mode all 2>&1 | tee build/ci-logs/debug-apk-build.log
          status=${PIPESTATUS[0]}
          echo "Gradle exit status: ${status}"
          exit ${status}

      - name: Print APK listing
        if: always()
        run: |
          find app/build/outputs -maxdepth 5 -type f | sort | tee build/ci-logs/output-files.log || true

      - name: Upload debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: you-rush-alaska-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
          retention-days: 14

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: you-rush-alaska-build-logs
          path: build/ci-logs/*.log
          if-no-files-found: warn
          retention-days: 14
