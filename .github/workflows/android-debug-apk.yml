name: Godot Android Debug APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - jtripp

jobs:
  validate-and-build:
    name: Validate Godot and build ARM64 APK
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      GODOT_VERSION: 4.7.1
      GODOT_BIN: /tmp/godot/godot
      ANDROID_HOME: /usr/local/lib/android/sdk

    steps:
      - name: Checkout current game
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK 36
        uses: android-actions/setup-android@v4

      - name: Install Android packages
        run: |
          yes | sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.1.0" \
            "ndk;29.0.14206865"

      - name: Install Godot and export templates
        run: |
          mkdir -p /tmp/godot
          curl --fail --location --retry 3 \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip" \
            --output /tmp/godot.zip
          unzip -q /tmp/godot.zip -d /tmp/godot
          mv "/tmp/godot/Godot_v${GODOT_VERSION}-stable_linux.x86_64" "$GODOT_BIN"
          chmod +x "$GODOT_BIN"
          curl --fail --location --retry 3 \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz" \
            --output /tmp/templates.tpz
          mkdir -p "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          unzip -q /tmp/templates.tpz -d /tmp/godot-templates
          cp -a /tmp/godot-templates/templates/. "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable/"

      - name: Restore custom Android build template
        run: |
          unzip -q \
            "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable/android_source.zip" \
            -d godot/android/build
          git checkout -- \
            godot/android/build/.gdignore \
            godot/android/build/src/main/AndroidManifest.xml \
            godot/android/build/src/main/java/com/jtripppiie/mooserush/YouRushBridge.java

      - name: Install validator dependency
        run: python3 -m pip install --disable-pip-version-check Pillow

      - name: Validate and run gameplay audits
        run: |
          python3 godot/validate_project.py
          godot/tools/run_gameplay_audits.sh build/ci-audits

      - name: Export ARM64 debug APK
        run: "$GODOT_BIN --headless --path godot --export-debug 'Android Debug'"

      - name: Inspect APK
        run: |
          APK=app/build/outputs/apk/debug/you-rush-alaska-5.4.0-debug.apk
          test -f "$APK"
          sha256sum "$APK" | tee build/apk-sha256.txt
          "$ANDROID_HOME/build-tools/36.1.0/aapt" dump badging "$APK" | tee build/apk-badging.txt
          "$ANDROID_HOME/build-tools/36.1.0/apksigner" verify --verbose "$APK" | tee build/apk-signature.txt

      - name: Upload APK, audits, and metadata
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: you-rush-alaska-5.4.0-arm64-debug
          path: |
            app/build/outputs/apk/debug/you-rush-alaska-5.4.0-debug.apk
            build/ci-audits/
            build/apk-*.txt
          if-no-files-found: warn
          retention-days: 14
