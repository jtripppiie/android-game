plugins {
    id "com.android.application"
}

android {
    namespace "com.jtripppiie.mooserush"
    compileSdk 35

    buildFeatures {
        buildConfig true
    }

    defaultConfig {
        applicationId "com.jtripppiie.mooserush"
        minSdk 23
        targetSdk 35
        versionCode 128
        versionName "1.2.8-beta"

        buildConfigField "String", "BUILD_CHANNEL", '"ALASKA BETA"'
        buildConfigField "String", "BUILD_BADGE", '"ALASKA BETA v1.2.8"'
        buildConfigField "boolean", "SHOW_VERSION_BADGE", "true"
    }
}
