plugins {
    id "com.android.application"
}

android {
    namespace "com.jtripppiie.mooserush"
    compileSdk 35

    buildFeatures {
        buildConfig true
    }

    defaultConfig {
        applicationId "com.jtripppiie.mooserush"
        minSdk 23
        targetSdk 35
        versionCode 6
        versionName "0.2.4-alpha"

        buildConfigField "String", "BUILD_CHANNEL", '"ALASKA DEV"'
        buildConfigField "String", "BUILD_BADGE", '"ALASKA DEV v0.2.4-alpha"'
        buildConfigField "boolean", "SHOW_VERSION_BADGE", "true"
    }
}
