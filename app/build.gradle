plugins {
    id "com.android.application"
}

android {
    namespace "com.jtripppiie.mooserush"
    compileSdk 35

    buildFeatures {
        buildConfig true
    }

    defaultConfig {
        applicationId "com.jtripppiie.mooserush"
        minSdk 23
        targetSdk 35
        versionCode 11
        versionName "0.4.0-alpha"

        buildConfigField "String", "BUILD_CHANNEL", '"ALASKA ALPHA"'
        buildConfigField "String", "BUILD_BADGE", '"ALASKA ALPHA v0.4.0"'
        buildConfigField "boolean", "SHOW_VERSION_BADGE", "true"
    }
}
