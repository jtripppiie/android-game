plugins {
    id "com.android.application"
}

android {
    namespace "com.jtripppiie.mooserush"
    compileSdk 35

    buildFeatures {
        buildConfig true
    }

    defaultConfig {
        applicationId "com.jtripppiie.mooserush"
        minSdk 23
        targetSdk 35
        versionCode 130
        versionName "1.3.0-beta"

        buildConfigField "String", "BUILD_CHANNEL", '"ALASKA BETA"'
        buildConfigField "String", "BUILD_BADGE", '"ALASKA BETA v1.3.0"'
        buildConfigField "boolean", "SHOW_VERSION_BADGE", "true"
    }
}

dependencies {
    testImplementation "junit:junit:4.13.2"
}

