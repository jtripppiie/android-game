plugins {
    id "com.android.application"
}

android {
    namespace "com.jtripppiie.mooserush"
    compileSdk 35

    buildFeatures {
        buildConfig true
    }

    defaultConfig {
        applicationId "com.jtripppiie.mooserush"
        minSdk 23
        targetSdk 35
        versionCode 184
        versionName "1.8.4-alpha"

        buildConfigField "String", "BUILD_CHANNEL", '"ALASKA BETA"'
        buildConfigField "String", "BUILD_BADGE", '"ALASKA ART v1.8.4"'
        buildConfigField "boolean", "SHOW_VERSION_BADGE", "true"
    }

    applicationVariants.configureEach { variant ->
        variant.outputs.configureEach {
            outputFileName = "you-rush-alaska-${variant.versionName}-${variant.versionCode}-${variant.name}.apk"
        }
    }
}

dependencies {
    testImplementation "junit:junit:4.13.2"
}
