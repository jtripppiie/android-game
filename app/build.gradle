plugins {
    id "com.android.application"
}

android {
    namespace "com.jtripppiie.mooserush"
    compileSdk 35

    buildFeatures {
        buildConfig true
    }

    defaultConfig {
        applicationId "com.jtripppiie.mooserush"
        minSdk 23
        targetSdk 35
        versionCode 20
        versionName "2.0.0-rc1"

        buildConfigField "String", "BUILD_CHANNEL", '"ALASKA RC"'
        buildConfigField "String", "BUILD_BADGE", '"ALASKA RC v2.0.0-rc1"'
        buildConfigField "boolean", "SHOW_VERSION_BADGE", "true"
    }
}
